name: Keep Render Awake

on:
  schedule:
    - cron: "7 * * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/keep-render-awake.yml"
  workflow_dispatch:

concurrency:
  group: keep-render-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 62

    steps:
      - name: Keep SkillBridge Agent warm
        shell: bash
        run: |
          for attempt in {1..12}; do
            echo "Ping ${attempt}/12 at $(date -u)"
            curl --fail --silent --show-error --max-time 120 https://skillbridge-agent.onrender.com/health

            if [ "$attempt" -lt 12 ]; then
              sleep 300
            fi
          done
