name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping SkillBridge Agent health endpoint
        run: curl --fail --silent --show-error --max-time 30 https://skillbridge-agent.onrender.com/health
